<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercício 5b</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap ícones -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- 1ª Digitação (Aqui) -->
    <div class="container mt-3">
  <form class="custom-form">
    <div class="col-sm-6 mb-3">
      <label for="email" class="form-label">Email</label>
      <div class="input-group">
        <span class="input-group-text custom-icon bg-email">
          <i class="bi bi-envelope text-white"></i>
        </span>
        <input type="email" class="form-control custom-input" id="email" />
      </div>
    </div>

    <div class="col-sm-6 mb-3">
      <label for="senha" class="form-label">Senha</label>
      <div class="input-group">
        <span class="input-group-text custom-icon bg-senha">
          <i class="bi bi-lock text-white"></i>
        </span>
        <input type="password" class="form-control custom-input" id="senha" />
      </div>
    </div>

    <button type="submit" class="btn custom-button">
      Enviar <i class="bi bi-arrow-right"></i>
    </button>
  </form>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
